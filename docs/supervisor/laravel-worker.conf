[group:laravel-workers]
programs=laravel-worker-high,laravel-worker-default,laravel-worker-low

[program:laravel-worker-high]
command=php /var/www/html/artisan queue:work redis --queue=high --sleep=1 --tries=3 --max-time=3600 --memory=256
process_name=%(program_name)s_%(process_num)02d
numprocs=3
autostart=true
autorestart=true
startsecs=3
startretries=3
user=www-data
redirect_stderr=true
stdout_logfile=/var/log/supervisor/laravel-worker-high.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=5

[program:laravel-worker-default]
command=php /var/www/html/artisan queue:work redis --queue=high,default --sleep=3 --tries=3 --max-time=3600 --memory=128
process_name=%(program_name)s_%(process_num)02d
numprocs=2
autostart=true
autorestart=true
startsecs=3
startretries=3
user=www-data
redirect_stderr=true
stdout_logfile=/var/log/supervisor/laravel-worker-default.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=5

[program:laravel-worker-low]
command=php /var/www/html/artisan queue:work redis --queue=high,default,low --sleep=5 --tries=2 --max-time=3600 --memory=128
process_name=%(program_name)s_%(process_num)02d
numprocs=1
autostart=true
autorestart=true
startsecs=3
startretries=3
user=www-data
redirect_stderr=true
stdout_logfile=/var/log/supervisor/laravel-worker-low.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=5
